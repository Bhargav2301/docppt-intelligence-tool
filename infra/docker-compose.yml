version: '3.8'

services:
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - nlp

  nlp:
    build:
      context: ../services/nlp
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../services/nlp:/app
      - model_cache:/root/.cache/huggingface
    environment:
      - ENV=development
      - ADVANCED_AI_ENABLED=false
      - ADVANCED_MODEL_ENDPOINT=http://host.docker.internal:11434/v1
      - ADVANCED_MODEL_NAME=llama3:latest

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: docppt
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  model_cache:
